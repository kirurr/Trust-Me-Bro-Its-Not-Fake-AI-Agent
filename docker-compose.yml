services:
  web:
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        VITE_BACKEND_URL: http://localhost:8080
        VITE_BACKEND_WS_URL: ws://localhost:8080/ws
    container_name: web
    depends_on:
      backend:
        condition: service_started
    ports:
      - "5173:80"
    restart: unless-stopped
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: backend
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://admin:secret@postgres:5432/mydb
      CORS_ALLOWED_ORIGIN: http://localhost:5173
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    ports:
      - "8080:8080"
    restart: unless-stopped
  tui:
    build:
      context: .
      dockerfile: tui/Dockerfile
    container_name: tui
    profiles:
      - tui
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      BACKEND_URL: http://backend:8080/
    volumes:
      - ./tui:/app
    stdin_open: true
    tty: true
    restart: unless-stopped
  rabbitmq:
    image: rabbitmq:4-management
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-mydb}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
volumes:
  rabbitmq-data:
  postgres_data:
    driver: local
